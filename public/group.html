<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Daftar Grup WhatsApp</title>
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
            rel="stylesheet"
        />
    </head>
    <body class="bg-light">
        <div class="container py-5">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shadow-sm">
                        <div
                            class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
                        >
                            <h4 class="mb-0">Daftar Grup WhatsApp Terhubung</h4>
                            <button
                                class="btn btn-light btn-sm"
                                onclick="loadGroups()"
                            >
                                Muat Ulang
                            </button>
                        </div>
                        <div class="card-body">
                            <div class="mb-3">
                                <label for="deviceSelect" class="form-label"
                                    >Pilih Sesi / Perangkat:</label
                                >
                                <select
                                    id="deviceSelect"
                                    class="form-select"
                                    onchange="loadGroups()"
                                >
                                    <option value="">
                                        -- Pilih Perangkat --
                                    </option>
                                </select>
                            </div>

                            <hr />

                            <div class="table-responsive">
                                <table
                                    class="table table-striped table-hover align-middle"
                                >
                                    <thead class="table-dark">
                                        <tr>
                                            <th>#</th>
                                            <th>Nama Grup</th>
                                            <th>JID Grup</th>
                                            <th>Aksi</th>
                                        </tr>
                                    </thead>
                                    <tbody id="groupTableBody">
                                        <tr>
                                            <td
                                                colspan="4"
                                                class="text-center text-muted"
                                            >
                                                Silakan pilih perangkat terlebih
                                                dahulu.
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <script>
            // Ambil daftar perangkat saat halaman pertama kali dibuka
            async function loadDevices() {
                try {
                    // Sesuaikan endpoint ini dengan rute API perangkat Anda
                    const response = await fetch("/api/devices");
                    const devices = await response.json();

                    const select = document.getElementById("deviceSelect");
                    devices.forEach((dev) => {
                        if (dev.status === "Terhubung") {
                            const option = document.createElement("option");
                            option.value = dev.phoneNumber;
                            option.textContent = `${dev.phoneNumber} (${dev.status})`;
                            select.appendChild(option);
                        }
                    });
                } catch (error) {
                    console.error("Gagal memuat perangkat:", error);
                }
            }

            // Fungsi untuk mengambil daftar grup berdasarkan sesi yang dipilih
            async function loadGroups() {
                const phoneNumber = document.getElementById("deviceSelect").value;
                const tbody = document.getElementById("groupTableBody");

                if (!phoneNumber) {
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Silakan pilih perangkat terlebih dahulu.</td></tr>`;
                    return;
                }

                tbody.innerHTML = `<tr><td colspan="4" class="text-center">Memuat data grup...</td></tr>`;

                try {
                    // Memanggil endpoint backend untuk mengambil grup
                    const response = await fetch(
                        `/api/groups?phoneNumber=${phoneNumber}`,
                    );
                    const result = await response.json();

                    if (result.success && result.groups.length > 0) {
                        tbody.innerHTML = "";
                        result.groups.forEach((group, index) => {
                            tbody.innerHTML += `
                            <tr>
                                <td>${index + 1}</td>
                                <td><strong>${group.subject || "Tanpa Nama"}</strong></td>
                                <td><code>${group.id}</code></td>
                                <td>
                                    <button class="btn btn-sm btn-outline-primary" onclick="copyJid('${group.id}')">Salin JID</button>
                                </td>
                            </tr>
                        `;
                        });
                    } else {
                        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Tidak ada grup ditemukan atau bot belum tergabung di grup manapun.</td></tr>`;
                    }
                } catch (error) {
                    console.error("Gagal memuat grup:", error);
                    tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">Terjadi kesalahan saat mengambil data grup.</td></tr>`;
                }
            }

            // Fungsi helper untuk menyalin JID ke clipboard
            function copyJid(jid) {
                navigator.clipboard.writeText(jid);
                alert(`JID disalin ke clipboard:\n${jid}`);
            }

            // Jalankan saat load awal
            loadDevices();
        </script>
    </body>
</html>
