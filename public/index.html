<!doctype html>
<html lang="id">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>WhatsApp Bot - Dashboard</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
            rel="stylesheet"
        />
        <style>
            .fade-in {
                animation: fadeIn 0.5s ease-in-out;
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                    transform: translateY(-10px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
        </style>
    </head>
    <body
        id="mainBody"
        style="display: none"
        class="bg-gray-50 text-gray-800 font-sans antialiased min-h-screen flex flex-col items-center py-10 px-4"
    >
        <div
            class="w-full max-w-md flex justify-between items-center mb-6 px-2 fade-in"
        >
            <div class="text-gray-600 font-medium flex items-center gap-2">
                <i class="fas fa-user-circle text-xl"></i>
                <span id="userInfoDisplay">User</span>
            </div>
            <div class="flex items-center gap-4">
                <a
                    href="/group.html"
                    id="adminBtn"
                    class="hidden text-sm text-blue-600 hover:text-blue-800 font-semibold transition-colors"
                >
                    <i class="fas fa-users-cog mr-1"></i> Grup
                </a>
                <a
                    href="/admin.html"
                    id="adminBtn"
                    class="hidden text-sm text-blue-600 hover:text-blue-800 font-semibold transition-colors"
                >
                    <i class="fas fa-users-cog mr-1"></i> Admin Panel
                </a>
                <button
                    onclick="logoutPanel()"
                    class="text-sm text-red-500 hover:text-red-700 font-semibold transition-colors"
                >
                    <i class="fas fa-sign-out-alt mr-1"></i> Keluar
                </button>
            </div>
        </div>

        <div class="w-full max-w-md flex flex-col gap-6">
            <div
                class="bg-white rounded-2xl shadow-xl w-full overflow-hidden fade-in"
            >
                <div class="bg-green-500 p-6 text-center text-white">
                    <i class="fab fa-whatsapp text-5xl mb-3"></i>
                    <h2 class="text-2xl font-bold">Hubungkan Perangkat</h2>
                    <p class="text-green-100 text-sm mt-1">
                        Gunakan nomor WA untuk mendapatkan Pairing Code
                    </p>
                </div>

                <div class="p-8">
                    <div class="mb-5">
                        <label
                            for="phoneInput"
                            class="block text-sm font-medium text-gray-700 mb-2"
                            >Nomor WhatsApp</label
                        >
                        <div class="relative">
                            <span
                                class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 font-medium"
                                >+</span
                            >
                            <input
                                type="text"
                                id="phoneInput"
                                placeholder="628123456789"
                                class="pl-7 block w-full rounded-lg border-gray-300 border px-4 py-3 text-gray-900 focus:ring-2 focus:ring-green-500 focus:border-green-500 transition-colors shadow-sm outline-none"
                                oninput="
                                    this.value = this.value.replace(
                                        /[^0-9]/g,
                                        '',
                                    )
                                "
                            />
                        </div>
                        <p
                            id="phoneError"
                            class="text-red-500 text-xs mt-1 hidden"
                        >
                            Nomor WhatsApp tidak boleh kosong.
                        </p>
                    </div>

                    <button
                        id="loginBtn"
                        onclick="startLogin()"
                        class="w-full bg-green-500 hover:bg-green-600 text-white font-semibold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2 shadow-md"
                    >
                        <span id="btnText">Dapatkan Kode</span>
                        <i
                            id="btnSpinner"
                            class="fas fa-spinner fa-spin hidden"
                        ></i>
                    </button>

                    <div id="resultArea" class="mt-8 text-center hidden">
                        <div class="border-t border-gray-200 pt-6">
                            <p
                                id="statusDisplay"
                                class="text-sm font-medium text-gray-600 mb-3"
                            ></p>
                            <div id="pairingCodeContainer" class="hidden">
                                <div
                                    class="bg-blue-50 border border-blue-200 rounded-lg p-4 mb-2 flex items-center justify-between"
                                >
                                    <h1
                                        id="pairingCodeDisplay"
                                        class="text-3xl font-mono font-bold text-blue-700 tracking-[0.2em] w-full text-center"
                                    ></h1>
                                </div>
                                <p class="text-xs text-gray-500">
                                    Buka WhatsApp > Perangkat Tertaut > Tautkan
                                    dengan Nomor Telepon
                                </p>
                            </div>
                            <img
                                id="qrDisplay"
                                src=""
                                alt="QR Code"
                                class="mx-auto mt-4 rounded-lg shadow-sm hidden max-w-[200px]"
                            />
                        </div>
                    </div>
                </div>
            </div>

            <div
                id="deviceListContainer"
                class="bg-white rounded-2xl shadow-xl w-full overflow-hidden hidden fade-in"
            >
                <div class="bg-gray-100 p-4 border-b border-gray-200">
                    <h3 class="text-lg font-bold text-gray-700">
                        <i class="fas fa-mobile-alt mr-2 text-gray-500"></i
                        >Perangkat Tersambung
                    </h3>
                </div>
                <div
                    id="deviceList"
                    class="p-4 flex flex-col gap-3 max-h-64 overflow-y-auto"
                ></div>
            </div>
        </div>

        <script src="/socket.io/socket.io.js"></script>
        <script>
            let currentUsername = "";
            let currentRole = "";
            const socket = io();

            // Cek Sesi Saat Halaman Dimuat
            document.addEventListener("DOMContentLoaded", async () => {
                try {
                    const response = await fetch("/api/auth/me");
                    if (!response.ok) {
                        window.location.replace("/login.html");
                    } else {
                        const data = await response.json();
                        currentUsername = data.user.username;
                        currentRole = data.user.role;

                        document.getElementById("mainBody").style.display =
                            "flex";
                        document.getElementById("userInfoDisplay").innerText =
                            `${currentUsername} (${currentRole})`;

                        // Jika rolenya admin, tampilkan tombol navigasi ke Admin Panel
                        if (currentRole === "admin") {
                            document
                                .getElementById("adminBtn")
                                .classList.remove("hidden");
                        }
                        fetchDevices();
                    }
                } catch (err) {
                    window.location.replace("/login.html");
                }
            });

            async function logoutPanel() {
                await fetch("/api/auth/logout", { method: "POST" });
                window.location.href = "/login.html";
            }

            // --- FUNGSI WHATSAPP ---
            const phoneInput = document.getElementById("phoneInput");
            const phoneError = document.getElementById("phoneError");
            const loginBtn = document.getElementById("loginBtn");
            const btnText = document.getElementById("btnText");
            const btnSpinner = document.getElementById("btnSpinner");
            const resultArea = document.getElementById("resultArea");
            const statusDisplay = document.getElementById("statusDisplay");
            const pairingCodeContainer = document.getElementById(
                "pairingCodeContainer",
            );
            const pairingCodeDisplay =
                document.getElementById("pairingCodeDisplay");
            const qrDisplay = document.getElementById("qrDisplay");

            const currentPhoneInput = () => phoneInput.value.trim();

            const setButtonLoading = (isLoading) => {
                if (isLoading) {
                    loginBtn.disabled = true;
                    loginBtn.classList.add("opacity-70", "cursor-not-allowed");
                    btnText.innerText = "Memproses...";
                    btnSpinner.classList.remove("hidden");
                } else {
                    loginBtn.disabled = false;
                    loginBtn.classList.remove(
                        "opacity-70",
                        "cursor-not-allowed",
                    );
                    btnText.innerText = "Dapatkan Kode";
                    btnSpinner.classList.add("hidden");
                }
            };

            const showStatus = (message, type = "info") => {
                resultArea.classList.remove("hidden");
                statusDisplay.innerText = message;
                statusDisplay.className =
                    "text-sm font-medium mb-3 " +
                    (type === "error"
                        ? "text-red-500"
                        : type === "success"
                          ? "text-green-600"
                          : "text-gray-600");
            };

            async function startLogin() {
                const phoneNumber = currentPhoneInput();
                phoneError.classList.add("hidden");
                phoneInput.classList.remove("border-red-500");
                pairingCodeContainer.classList.add("hidden");
                qrDisplay.classList.add("hidden");

                if (!phoneNumber) {
                    phoneError.classList.remove("hidden");
                    phoneInput.classList.add("border-red-500");
                    phoneInput.focus();
                    return;
                }

                setButtonLoading(true);
                showStatus("Meminta kode ke server...", "info");

                try {
                    const response = await fetch("/api/start-session", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ phoneNumber }),
                    });

                    const result = await response.json();
                    if (!response.ok) {
                        setButtonLoading(false);
                        showStatus(result.error || "Gagal memproses", "error");
                    }
                    if (
                        response.ok &&
                        result.message?.includes("sudah berjalan")
                    ) {
                        setButtonLoading(false);
                        showStatus(
                            "✅ Nomor ini sudah login dan aktif.",
                            "info",
                        );
                    }
                } catch (err) {
                    setButtonLoading(false);
                    showStatus("Terjadi kesalahan jaringan", "error");
                }
            }

            async function fetchDevices() {
                try {
                    const res = await fetch("/api/devices");
                    if (res.ok) {
                        const devices = await res.json();
                        renderDevices(devices);
                    }
                } catch (error) {
                    console.error("Gagal mengambil data perangkat", error);
                }
            }

            function renderDevices(devices) {
                const container = document.getElementById(
                    "deviceListContainer",
                );
                const list = document.getElementById("deviceList");
                if (!devices || devices.length === 0) {
                    container.classList.add("hidden");
                    return;
                }

                container.classList.remove("hidden");
                list.innerHTML = "";
                devices.forEach((device) => {
                    const isConnected = device.status
                        .toLowerCase()
                        .includes("terhubung");
                    const statusColor = isConnected
                        ? "text-green-500"
                        : "text-yellow-500";
                    const iconColor = isConnected
                        ? "text-green-500"
                        : "text-gray-400";

                    const item = document.createElement("div");
                    item.className =
                        "flex justify-between items-center p-3 border border-gray-200 rounded-lg bg-gray-50 hover:shadow-sm transition-shadow";
                    item.innerHTML = `
                        <div class="flex items-center gap-3">
                            <i class="fab fa-whatsapp text-3xl ${iconColor}"></i>
                            <div>
                                <p class="font-bold text-gray-800 tracking-wide">+${device.phoneNumber}</p>
                                <p class="text-xs font-medium ${statusColor}"><i class="fas fa-circle text-[8px] mr-1"></i>${device.status}</p>
                            </div>
                        </div>
                        <button onclick="logoutDevice('${device.phoneNumber}')" class="text-red-500 hover:text-red-700 transition-colors p-2 rounded-full hover:bg-red-50" title="Putuskan Perangkat">
                            <i class="fas fa-power-off text-lg"></i>
                        </button>
                    `;
                    list.appendChild(item);
                });
            }

            async function logoutDevice(phoneNumber) {
                if (
                    !confirm(
                        `Apakah Anda yakin ingin mengeluarkan nomor +${phoneNumber}?`,
                    )
                )
                    return;
                try {
                    const res = await fetch("/api/end-session", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ phoneNumber }),
                    });
                    if (res.ok) fetchDevices();
                } catch (err) {
                    alert("Terjadi kesalahan jaringan");
                }
            }

            // --- SOCKET.IO LISTENERS ---
            socket.on("pairing-code", (data) => {
                if (data.phoneNumber === currentPhoneInput()) {
                    setButtonLoading(false);
                    showStatus("Menunggu konfirmasi di HP Anda...", "success");
                    pairingCodeContainer.classList.remove("hidden");
                    pairingCodeDisplay.innerText = data.code;
                    fetchDevices();
                }
            });

            socket.on("status", (data) => {
                fetchDevices();
                if (data.phoneNumber === currentPhoneInput()) {
                    if (
                        data.status.toLowerCase().includes("terhubung") ||
                        data.status.toLowerCase().includes("open")
                    ) {
                        showStatus(
                            "✅ Perangkat Berhasil Terhubung!",
                            "success",
                        );
                        pairingCodeContainer.classList.add("hidden");
                    } else {
                        showStatus(`Status: ${data.status}`, "info");
                    }
                }
            });
        </script>
    </body>
</html>
